# 单镜像部署(对齐 sub2api):app(前端+后端一个容器) + mysql + redis
# 用 deploy.sh 操作(up / build / rebuild / down / logs / ps / clean)
# 入口:http://localhost:3000 (前端页面 + /api 同一端口)
#
# 配置:cp .env.example .env 后按需修改;不建 .env 也能跑(用缺省值)。

name: miniapp-deploy   # 固定项目名 => 数据卷名固定(miniapp-deploy_mysql_data)

services:
  # ===========================================================================
  # 应用(前端静态 + 后端 API,单镜像)
  # ===========================================================================
  app:
    build: .
    container_name: miniapp-deploy-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-123456}"
      MYSQL_DATABASE: miniapp
      MYSQL_CONNECTION_LIMIT: "10"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      JWT_SECRET: "${JWT_SECRET:-dev_secret_change_me}"
      JWT_EXPIRES_IN: "7d"
      # 首次启动自动建管理员(两者都填且邮箱不存在时):免手动改 SQL 提权
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      # SMTP:留空 SMTP_HOST => 验证码打到日志(./deploy.sh logs)
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-no-reply@example.com}"
      VERIFY_CODE_TTL: "300"
      VERIFY_COOLDOWN: "60"
    ports:
      - "3000:3000"          # 唯一入口:前端 + API
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===========================================================================
  # MySQL(仅容器内网,不暴露宿主机端口)
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: miniapp-deploy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_PASSWORD:-123456}"
      MYSQL_DATABASE: miniapp
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro  # 首启自动建全部表
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD:-123456}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 120s   # 首次初始化在慢盘(WSL)上可能 >60s,期间不计失败

  # ===========================================================================
  # Redis(仅容器内网)
  # ===========================================================================
  redis:
    image: redis:7
    container_name: miniapp-deploy-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  mysql_data:
