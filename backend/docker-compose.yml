# 本地开发用：一条命令拉起 MySQL + Redis，参数对齐 .env.example
# 用法：
#   docker compose up -d      # 后台启动这两个服务
#   docker compose ps         # 查看状态
#   docker compose down       # 停止并删除容器（数据卷保留）
#   docker compose down -v    # 连数据一起清空，回到干净状态

services:
  mysql:
    image: mysql:8.0
    container_name: miniapp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"   # 对应 .env 的 MYSQL_PASSWORD
      MYSQL_DATABASE: miniapp         # 启动时自动建好这个库
    ports:
      - "3306:3306"                   # 把容器 3306 映射到你本机 3306
    volumes:
      - mysql_data:/var/lib/mysql                 # 数据持久化，重启不丢
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro  # 首次启动自动跑建表脚本
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: miniapp-redis
    ports:
      - "6379:6379"                   # 对应 .env 的 REDIS_PORT
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
